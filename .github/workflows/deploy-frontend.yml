name: Deploy Flora Farm Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: http://14.225.207.221:5002
        run: npm run build

      - name: Archive dist
        run: tar -czf frontend-dist.tar.gz -C dist .

      - name: Copy dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          source: "frontend-dist.tar.gz"
          target: "/tmp"

      - name: Deploy dist on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            DEPLOY_DIR=/var/www/flora-farm/dist
            TMP_FILE=/tmp/frontend-dist.tar.gz

            mkdir -p $DEPLOY_DIR
            rm -rf $DEPLOY_DIR/*
            tar -xzf $TMP_FILE -C $DEPLOY_DIR
            rm -f $TMP_FILE

            nginx -t
            systemctl reload nginx