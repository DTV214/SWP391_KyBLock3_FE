name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: http://160.187.229.26:5002/api
          VITE_SIGNALR_URL: http://160.187.229.26:5002/chatHub
        run: npm run build

      - name: Archive dist
        run: tar -czf frontend-dist.tar.gz -C dist .

      - name: Copy dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 160.187.229.26
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: "frontend-dist.tar.gz"
          target: "/tmp"
          debug: true

      - name: Deploy dist on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 160.187.229.26
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e

            apt update
            apt install -y nginx

            DEPLOY_DIR=/var/www/html
            TMP_FILE=/tmp/frontend-dist.tar.gz

            mkdir -p $DEPLOY_DIR
            cp -r $DEPLOY_DIR ${DEPLOY_DIR}_backup_$(date +%Y%m%d_%H%M%S) 2>/dev/null || true
            rm -rf $DEPLOY_DIR/*
            tar -xzf $TMP_FILE -C $DEPLOY_DIR
            rm -f $TMP_FILE

            cat > /etc/nginx/sites-available/default << 'EOF'
            server {
                listen 80 default_server;
                listen [::]:80 default_server;

                server_name _;

                root /var/www/html;
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                }
            }
            EOF

            nginx -t
            systemctl enable nginx
            systemctl reload nginx || systemctl restart nginx